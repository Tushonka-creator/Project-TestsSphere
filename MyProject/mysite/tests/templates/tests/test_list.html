{% extends "base.html" %}

{% block content %}
<h1>Тесты</h1>
<ul>
    {% for t in tests %}
    <li>
        <a href="{% url 'tests:test_detail' t.slug %}">{{ t.title }}</a>
        {% if t.description %}<p>{{ t.description }}</p>{% endif %}
    </li>
    {% empty %}
    <li>Пока нет опубликованных тестов</li>
    {% endfor %}
</ul>
{% endblock %}
