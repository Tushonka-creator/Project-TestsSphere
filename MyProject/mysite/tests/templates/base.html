<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TestSphere{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
        nav { margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
        footer { margin-top: 4rem; text-align: center; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/">ГЛАВНАЯ</a>
        {% if user.is_authenticated %}
            | <a href="{% url 'tests:profile' %}">ПРОФИЛЬ ({{ user.username }})</a>
            | <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer; padding: 0; font-family: inherit; font-size: inherit;">ВЫЙТИ</button>
              </form>
        {% else %}
            | <a href="{% url 'login' %}">ВОЙТИ</a>
            | <a href="{% url 'tests:register' %}">РЕГИСТРАЦИЯ</a>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        &copy; 2026 TestSphere
    </footer>
</body>
</html>
